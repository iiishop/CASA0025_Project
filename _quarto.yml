project:
  type: website
  output-dir: docs

book:
  title: "CASA0025 Final Assessment"
  author: "Group 1"
  date: "29/04/2026"
  chapters:
    - index.qmd

  repo-actions: [edit]
  downloads: [pdf, epub]
  sharing: [twitter, facebook]
  favicon: favicon.ico
  sidebar:
    logo: casa_logo.png

format:
  html:
    theme:
      light: litera
      dark: darkly
    code-copy: true
    code-overflow: wrap
    highlight-style:
      light: atom-one-light
      dark: monokai
    toc: true
    toc-title: "Contents"
    toc-depth: 3
    toc_float:
      collapsed: false
      smooth_scroll: true

website:
  favicon: images/flavicon.png
  page-navigation: true
  site-url: "https://iiishop.github.io/Explore_walkability_across_london/"
  repo-url: "https://github.com/iiishop/CASA0025_Project"
  page-footer:
    background: "#2ba8e0"
    foreground: "#00698e"
    left: "<div style='text-align: left'>CASA0025 Group Project | Authors: Yu Shi, Anna Saveleva, Yuqian Lin</div>"
    right: 
      - "<span style='margin-right: 5px;'>For all precomputation scripts and main app code, please visit:</span>"
      - icon: github
        href: https://github.com/iiishop/CASA0025_Project
        target: "_blank" 